<!DOCTYPE html>
<html>
<head>
<title>Fertility Analysis Result</title>

<style>

body{
    font-family: "Segoe UI", Arial, sans-serif;
    background:#f4f8fc;
    margin:0;
}

/* Header */

.header{
    background:#0b5ed7;
    color:white;
    padding:18px;
    text-align:center;
    font-size:22px;
    font-weight:600;
}

/* Container */

.container{
    width:480px;
    margin:60px auto;
    background:white;
    padding:35px;
    border-radius:10px;
    box-shadow:0 6px 20px rgba(0,0,0,0.08);
    border-top:5px solid #0b5ed7;
    text-align:center;
}

/* Result Box */

.result-box{
    background:#eef4ff;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

.result-text{
    font-size:20px;
    font-weight:600;
    color:#0b5ed7;
    margin-bottom:10px;
}

/* Confidence */

.confidence{
    font-size:14px;
    color:#555;
    margin-bottom:10px;
}

/* Progress Bar */

.progress-bar{
    width:100%;
    height:10px;
    background:#e0e6ed;
    border-radius:10px;
    overflow:hidden;
}

.progress{
    height:100%;
    background:#0b5ed7;
    width: {{ probability }}%;
}

/* Guidance Text */

.guidance{
    margin-top:20px;
    font-size:14px;
    color:#555;
}

/* Button */

.button{
    display:inline-block;
    margin-top:20px;
    padding:12px 20px;
    background:#0b5ed7;
    color:white;
    text-decoration:none;
    border-radius:6px;
    font-weight:bold;
}

.button:hover{
    background:#084298;
}

/* Note */

.note{
    font-size:12px;
    color:#6c757d;
    margin-top:15px;
}

</style>

</head>

<body>

<div class="header">
Fertility Analysis Result
</div>

<div class="container">

<div class="result-box">
    <div class="result-text">{{ result }}</div>

    <div class="confidence">
        Confidence Level: {{ probability }}%
    </div>

    <div class="progress-bar">
        <div class="progress"></div>
    </div>
</div>

<div class="guidance">
For a more comprehensive evaluation, proceed to detailed fertility assessment.
</div>

<a href="/fertility" class="button">
Continue to Fertility Assessment
</a>

<div class="note">
This AI-based prediction is for screening purposes only and should not replace professional medical advice.
</div>

</div>

</body>
</html>
