<!DOCTYPE html>
<html>
<head>
<title>PCOS Risk Assessment</title>

<style>

body{
    font-family: "Segoe UI", Arial, sans-serif;
    background:#f4f8fc;
    margin:0;
}

/* Header */

.header{
    background:#0b5ed7;
    color:white;
    padding:18px;
    text-align:center;
    font-size:22px;
    font-weight:600;
    letter-spacing:0.5px;
}

/* Container */

.container{
    width:550px;
    margin:40px auto;
    background:white;
    padding:35px;
    border-radius:10px;
    box-shadow:0 6px 20px rgba(0,0,0,0.08);
    border-top:5px solid #0b5ed7;
}

h2{
    text-align:center;
    margin-bottom:25px;
    color:#2c3e50;
}

/* Form Group */

.form-group{
    margin-bottom:18px;
    text-align:center;
}

label{
    display:block;
    font-weight:600;
    margin-bottom:6px;
    color:#34495e;
}

/* Inputs */

input{
    width:70%;
    padding:10px;
    border:1px solid #ccd6e0;
    border-radius:6px;
    background:#f9fbfd;
    text-align:center;
}

input:focus{
    outline:none;
    border-color:#0b5ed7;
    background:white;
}

/* Radio Buttons */

.radio-group{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:8px;
}

.radio-group label{
    font-weight:500;
    color:#333;
}

/* Button */

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    background:#0b5ed7;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#084298;
}

/* Footer */

.note{
    font-size:12px;
    color:#6c757d;
    margin-top:15px;
    text-align:center;
}

</style>

</head>

<body>

<div class="header">
PCOS Clinical Risk Assessment
</div>

<div class="container">

<h2>Patient Health Details</h2>

<form action="/predict" method="post">

<div class="form-group">
<label>Age (years)</label>
<input type="number" name="age" required>
</div>

<div class="form-group">
<label>Weight (kg)</label>
<input type="number" name="weight" required>
</div>

<div class="form-group">
<label>Height (cm)</label>
<input type="number" name="height" required>
</div>

<div class="form-group">
<label>Are menstrual cycles regular?</label>
<div class="radio-group">
<label><input type="radio" name="cycle_regular" value="1"> Yes</label>
<label><input type="radio" name="cycle_regular" value="0"> No</label>
</div>
</div>

<div class="form-group">
<label>Average cycle length (days)</label>
<input type="number" name="cycle_length" required>
</div>

<div class="form-group">
<label>Recent unexplained weight gain?</label>
<div class="radio-group">
<label><input type="radio" name="weight_gain" value="Yes"> Yes</label>
<label><input type="radio" name="weight_gain" value="No"> No</label>
</div>
</div>

<div class="form-group">
<label>Excess facial/body hair growth?</label>
<div class="radio-group">
<label><input type="radio" name="hair_growth" value="Yes"> Yes</label>
<label><input type="radio" name="hair_growth" value="No"> No</label>
</div>
</div>

<div class="form-group">
<label>Hair thinning or hair fall?</label>
<div class="radio-group">
<label><input type="radio" name="hair_loss" value="Yes"> Yes</label>
<label><input type="radio" name="hair_loss" value="No"> No</label>
</div>
</div>

<div class="form-group">
<label>Frequent acne or pimples?</label>
<div class="radio-group">
<label><input type="radio" name="pimples" value="Yes"> Yes</label>
<label><input type="radio" name="pimples" value="No"> No</label>
</div>
</div>

<div class="form-group">
<label>Darkening of skin (neck/underarms)?</label>
<div class="radio-group">
<label><input type="radio" name="skin_darkening" value="Yes"> Yes</label>
<label><input type="radio" name="skin_darkening" value="No"> No</label>
</div>
</div>

<div class="form-group">
<label>Do you exercise regularly?</label>
<div class="radio-group">
<label><input type="radio" name="exercise" value="Yes"> Yes</label>
<label><input type="radio" name="exercise" value="No"> No</label>
</div>
</div>

<div class="form-group">
<label>Frequent fast food consumption?</label>
<div class="radio-group">
<label><input type="radio" name="fast_food" value="Yes"> Yes</label>
<label><input type="radio" name="fast_food" value="No"> No</label>
</div>
</div>

<button type="submit">Analyze PCOS Risk</button>

</form>

<div class="note">
AI-based preliminary screening. Not a substitute for medical diagnosis.
</div>

</div>

</body>
</html>
