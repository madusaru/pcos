<!DOCTYPE html>
<html>
<head>
<title>Male Fertility Analysis Result</title>

<style>

body{
    font-family: "Segoe UI", Arial, sans-serif;
    background:#f4f8fc;
    margin:0;
}

/* Header */

.header{
    background:#0b5ed7;
    color:white;
    padding:18px;
    text-align:center;
    font-size:22px;
    font-weight:600;
}

/* Container */

.container{
    width:520px;
    margin:60px auto;
    background:white;
    padding:35px;
    border-radius:10px;
    box-shadow:0 6px 20px rgba(0,0,0,0.08);
    border-top:5px solid #0b5ed7;
    text-align:center;
}

/* Result Box */

.result-box{
    background:#eef4ff;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    text-align:left;
}

/* Result Title */

.result-title{
    font-size:18px;
    font-weight:600;
    color:#0b5ed7;
    margin-bottom:10px;
    text-align:center;
}

/* Result Content */

.result-content{
    font-size:14px;
    color:#333;
    white-space:pre-wrap;
}

/* Buttons */

.button{
    display:inline-block;
    margin:10px;
    padding:12px 20px;
    background:#0b5ed7;
    color:white;
    text-decoration:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}

.button:hover{
    background:#084298;
}

/* Note */

.note{
    font-size:12px;
    color:#6c757d;
    margin-top:15px;
}

</style>

</head>

<body>

<div class="header">
Male Fertility Analysis Result
</div>

<div class="container">

<div class="result-box">
    <div class="result-title">Analysis Summary</div>

    <div class="result-content">
        {{ result }}
    </div>
</div>

<a href="/" class="button">Go to Home</a>
<a href="/male" class="button">Analyze Another Report</a>

<div class="note">
This AI-based analysis is for screening purposes only and should not replace professional medical consultation.
</div>

</div>
</body>
</html>
