<!DOCTYPE html>
<html>
<head>
<title>Ultrasound Analysis</title>

<style>

body{
    font-family: "Segoe UI", Arial, sans-serif;
    background:#f4f8fc;
    margin:0;
}

/* Header */

.header{
    background:#0b5ed7;
    color:white;
    padding:18px;
    text-align:center;
    font-size:22px;
    font-weight:600;
}

/* Container */

.container{
    width:500px;
    margin:60px auto;
    background:white;
    padding:35px;
    border-radius:10px;
    box-shadow:0 6px 20px rgba(0,0,0,0.08);
    border-top:5px solid #0b5ed7;
    text-align:center;
}

/* Result Box */

.result{
    background:#eef4ff;
    padding:15px;
    border-radius:8px;
    margin-bottom:20px;
    font-size:16px;
    font-weight:600;
    color:#0b5ed7;
}

/* Upload Box */

.upload-box{
    border:2px dashed #ccd6e0;
    padding:20px;
    border-radius:8px;
    background:#f9fbfd;
    margin-bottom:20px;
}

input[type="file"]{
    margin-top:10px;
}

/* Button */

button{
    width:100%;
    padding:12px;
    background:#0b5ed7;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#084298;
}

/* Text */

p{
    color:#555;
    margin-bottom:15px;
}

.note{
    font-size:12px;
    color:#6c757d;
    margin-top:15px;
}

</style>

</head>

<body>

<div class="header">
PCOS Ultrasound Verification
</div>

<div class="container">

<div class="result">
PCOS Likely ({{ probability }}% confidence)
</div>

<p>Upload ultrasound image for further clinical confirmation</p>

<form action="/predict_image" method="post" enctype="multipart/form-data">

<div class="upload-box">
    <label>Select Ultrasound Image</label><br>
    <input type="file" name="image" accept="image/*" required>
</div>

<button type="submit">Upload & Analyze Image</button>

</form>

<div class="note">
AI-assisted imaging analysis. Please consult a healthcare professional for diagnosis.
</div>

</div>

</body>
</html>
